[package]
name = "hjkl-buffer"
description = "Rope-backed text buffer with cursor and edits. Pre-1.0 churn."
keywords = ["rope", "buffer", "text", "editor"]
categories = ["text-editors", "data-structures"]
version.workspace = true
# Edition pinned to 2024 (override workspace 2021): the rope render path uses
# stable 2024-only let-chains. Internal — does not affect downstream consumers.
edition = "2024"
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
homepage.workspace = true
readme = "README.md"

[features]
default = []
ratatui = ["dep:ratatui"]

[dependencies]
ratatui = { version = "0.29", optional = true }
regex = "1"
unicode-width = "0.2"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
rustdoc-args = ["--cfg", "docsrs"]
